---
# Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: archive
  labels:
    app: digital-archive

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: docs-service-config
  namespace: archive
data:
  FLASK_ENV: "production"
  PYTHONUNBUFFERED: "1"

---
# Deployment for docs-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-service
  namespace: archive
  labels:
    app: docs-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: docs-service
  template:
    metadata:
      labels:
        app: docs-service
        version: v1
    spec:
      containers:
      - name: docs-service
        image: localhost:5000/docs-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: docs-service-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      securityContext:
        fsGroup: 1000

---
# Service for docs-service
apiVersion: v1
kind: Service
metadata:
  name: docs-service
  namespace: archive
  labels:
    app: docs-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: docs-service

---
# HorizontalPodAutoscaler for docs-service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docs-service-hpa
  namespace: archive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: docs-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress for docs-service (optional, for external access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-service-ingress
  namespace: archive
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
  - host: docs-service.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docs-service
            port:
              number: 80
